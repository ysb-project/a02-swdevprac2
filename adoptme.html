<!DOCTYPE html>
<html>
    <head>
        <title>Adopt Me</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Adopt Me</h1>
        <form onsubmit="alert('Successfully Submitted!!'); return true;">
            <div id="personal">
                <h2>Personal Info</h2>
                <div class="personal-grid">
                    <label for="fullname">Name - Surname: </label>
                    <input type="text" id="fullname" name="fullname" placeholder="Name Surname">
                    
                    <label for="phone-number">Phone number : </label>
                    <input type="tel" id="phone-number" name="phone-number" placeholder="Phone Number">
                    
                    <label for="email">Email : </label>
                    <input type="email" id="email" name="email" placeholder="Email">
                </div>
            </div>
            <div id="enviroment">
                <h2>Your Enviroment information</h2>
                <label for="address">Address : </label>
                <input type="text" id="address" name="address" placeholder="Address" size="20">
                <br><label>Accommodation characteristics : </label>
                <select id="residence" name="residence" size="1">
                    <option value="Garden-House">Garden House (บ้านสวน)</option>
                    <option value="Single-Detached-House">Single-Detached House (บ้านเดี่ยว)</option>
                    <option value="Townhome">Townhome (ทาวน์โฮม)</option>
                    <option value="Condominium-Dormitory">Condominium / Dormitory (คอนโดมิเนียม/หอพัก)</option>
                </select>
                <br>
                <div>
                    <label>Type of care : </label> 
                    <input type="radio" id="indoor" name="Types-of-Care" value="indoor" checked>
                    <label for="indoor">Indoor</label>
                    <input type="radio" id="outdoor" name="Types-of-Care" value="outdoor" >
                    <label for="outdoor">Outdoor</label>
                </div>
               
                <label for="pet-numbers">The number of pets you currently own : </label>
                <input type="number" id="pet-numbers" name="pet-numbers" min="0" value="0" >
                <br>
                <div class="checkbox-group">
                    <input type="checkbox" id="disclaimer" name="disclaimer"> 
                    <label for="disclaimer">การส่งแบบฟอร์มนี้เป็นการแจ้งความสนใจ โดยไม่รับรองการได้รับอุปการะสุนัข</label>
                </div>
                <button type="submit" >Submit</button>
            </div>
        </form>

        <div class="my-name">
            6833055021 Yanisa Boonprasert
        </div>
    </body>
</html>
